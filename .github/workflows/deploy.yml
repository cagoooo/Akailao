name: 🚀 部署到 GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    # 🆕 NEW [v3.8.5] D-5: 強制 actions 使用 Node.js 24（消除 Node 20 deprecation 警告，2026-09-16 後將強制升級）
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 📥 取得程式碼
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ 設定 GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: 🔑 注入環境變數
        run: python .github/inject.py
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # 🆕 NEW [v3.8.7] D-2: 建置 Tailwind CSS（保險措施，本地 commit 應已含 tailwind-build.css）
      - name: 🎨 建置 Tailwind CSS
        run: |
          npm install --no-save @tailwindcss/cli@^4 tailwindcss@^4
          npx tailwindcss -i tailwind.input.css -o tailwind-build.css --minify

      - name: 📦 上傳網站檔案
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🌐 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
