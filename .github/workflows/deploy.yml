name: 🚀 部署到 GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    # 🆕 NEW [v3.8.5] D-5: 強制 actions 使用 Node.js 24
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 📥 取得程式碼
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ 設定 GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: 📦 安裝依賴
        run: npm ci

      # 🆕 [v3.8.25] D-1: Vite 構建（取代舊的 inject.py + tailwind 流程）
      # Vite 會自動注入 API Keys（透過 define 配置讀取環境變數）
      # 並將所有 JS/CSS 內聯回單一 HTML 輸出至 dist/
      - name: 🔧 Vite 構建
        run: npm run build
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # 備用：對 dist/index.html 執行 inject.py 替換殘留佔位符
      - name: 🔑 注入環境變數（備用）
        run: |
          python .github/inject.py --target dist/index.html 2>/dev/null || true
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # 複製 set.html 和其他靜態資源到 dist/
      - name: 📋 複製靜態資源
        run: |
          cp set.html dist/set.html 2>/dev/null || true
          cp -r icons dist/icons 2>/dev/null || true
          cp manifest.json dist/manifest.json 2>/dev/null || true
          cp sw.js dist/sw.js 2>/dev/null || true

      # 🆕 [V4.1.1] 注入 BUILD_VERSION 到 sw.js（git hash + 時間戳）
      # 讓每次 CI build 後 sw.js byte 都不同 → 瀏覽器一定偵測到更新 → updatefound 正確 fire
      - name: 🔧 注入 Build Version 到 sw.js
        run: |
          BUILD_VERSION="$(git rev-parse --short HEAD)-$(date -u +%Y%m%d%H%M)"
          sed -i "s/__BUILD_VERSION__/${BUILD_VERSION}/g" dist/sw.js
          echo "✓ sw.js BUILD_VERSION 已注入：${BUILD_VERSION}"

      # 🆕 [V3.9.3] 把 set.html 裡的 __APP_VERSION__ sentinel 替換成 package.json 版本
      - name: 🏷️ 注入版本號到 set.html
        run: |
          APP_VERSION=$(node -p "require('./package.json').version")
          sed -i "s/__APP_VERSION__/${APP_VERSION}/g" dist/set.html
          echo "✓ set.html 版本號已注入：${APP_VERSION}"

      # 🆕 [V4.1.0] BUILD-A: 所有替換完成後，確認 dist/ 無殘留 sentinel（防止 V3.9.4 類型的 sed 自覆蓋雷）
      # 分兩條線：① Vite sentinel（import.meta.env.VITE_*）② set.html APP_VERSION sentinel
      - name: 🔍 Build smoke test — sentinel 殘留偵測
        run: |
          FAIL=0
          # ① dist/index.html：Vite 未替換的 import.meta.env.VITE_XXX
          VITE_LEFT=$(grep -oE 'import\.meta\.env\.VITE_[A-Z_]+' dist/index.html 2>/dev/null || true)
          if [ -n "$VITE_LEFT" ]; then
            echo "::error::❌ dist/index.html 仍有未替換的 Vite sentinel，請確認 GitHub Secrets："
            echo "$VITE_LEFT"
            FAIL=1
          else
            echo "✓ dist/index.html：Vite sentinel 全部已替換"
          fi
          # ② dist/set.html：__APP_VERSION__ 是否仍存在（sed 替換失敗才會殘留）
          VER_LEFT=$(grep -o '__APP_VERSION__' dist/set.html 2>/dev/null || true)
          if [ -n "$VER_LEFT" ]; then
            echo "::error::❌ dist/set.html 仍有 __APP_VERSION__ sentinel，sed 替換失敗"
            FAIL=1
          else
            echo "✓ dist/set.html：版本 sentinel 已正確替換"
          fi
          # ③ dist/sw.js：__BUILD_VERSION__ 是否仍存在（sw.js BUILD_VERSION 注入失敗才會殘留）
          BV_LEFT=$(grep -o '__BUILD_VERSION__' dist/sw.js 2>/dev/null || true)
          if [ -n "$BV_LEFT" ]; then
            echo "::error::❌ dist/sw.js 仍有 __BUILD_VERSION__ sentinel，sed 注入失敗"
            FAIL=1
          else
            echo "✓ dist/sw.js：BUILD_VERSION sentinel 已正確注入"
          fi
          exit $FAIL

      - name: 📦 上傳網站檔案
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: 🌐 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
