name: 🚀 部署到 GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    # 🆕 NEW [v3.8.5] D-5: 強制 actions 使用 Node.js 24
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 📥 取得程式碼
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ 設定 GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: 📦 安裝依賴
        run: npm ci

      # 🆕 [v3.8.25] D-1: Vite 構建（取代舊的 inject.py + tailwind 流程）
      # Vite 會自動注入 API Keys（透過 define 配置讀取環境變數）
      # 並將所有 JS/CSS 內聯回單一 HTML 輸出至 dist/
      - name: 🔧 Vite 構建
        run: npm run build
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # 備用：對 dist/index.html 執行 inject.py 替換殘留佔位符
      - name: 🔑 注入環境變數（備用）
        run: |
          python .github/inject.py --target dist/index.html 2>/dev/null || true
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # 複製 set.html 和其他靜態資源到 dist/
      - name: 📋 複製靜態資源
        run: |
          cp set.html dist/set.html 2>/dev/null || true
          cp -r icons dist/icons 2>/dev/null || true
          cp manifest.json dist/manifest.json 2>/dev/null || true
          cp sw.js dist/sw.js 2>/dev/null || true

      # 🆕 [V3.9.3] 把 set.html 裡的 __APP_VERSION__ sentinel 替換成 package.json 版本
      - name: 🏷️ 注入版本號到 set.html
        run: |
          APP_VERSION=$(node -p "require('./package.json').version")
          sed -i "s/__APP_VERSION__/${APP_VERSION}/g" dist/set.html
          echo "✓ set.html 版本號已注入：${APP_VERSION}"

      - name: 📦 上傳網站檔案
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: 🌐 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
